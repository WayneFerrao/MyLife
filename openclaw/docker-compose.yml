name: openclaw

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    ports:
      - "127.0.0.1:18789:18789"
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./workspace}:/home/node/.openclaw/workspace
      - ${OPENCLAW_EXTENSIONS_DIR:-./extensions}:/home/node/extensions-src:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shared
    command:
      - sh
      - -c
      - |
        # Copy extensions from the Windows mount to a proper Linux path and fix perms
        rm -rf /home/node/extensions
        cp -a /home/node/extensions-src /home/node/extensions
        chmod -R 755 /home/node/extensions
        chown -R node:node /home/node/extensions 2>/dev/null || true
        for dir in /home/node/extensions/*/; do
          if [ -f "$${dir}package.json" ] && grep -q '"dependencies"' "$${dir}package.json" 2>/dev/null; then
            echo "[startup] installing npm deps: $$dir"
            (cd "$$dir" && npm install --omit=dev) || true
          fi
        done
        exec node dist/index.js gateway --bind ${OPENCLAW_GATEWAY_BIND:-lan} --port 18789
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  shared:
    name: mylife-shared
    external: true
